<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather web-page</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" id="city-input" spellcheck="false" />
            <button id="search-btn"><img src="images/magnifying-glass.png" alt="Search" class="search-icon"></button>
        </div>

        <div class="error">
            <p>City not found</p></div>

        <div class="weather">
            <img src="images/rain.png" class="weather-icon" alt="Weatherimage">
            <h1 class="temperature" id="temperature">25°C</h1>
            <h2 class="city" id="city">New York</h2>
        </div>
        <div class="details">
            <div class="col">
                <img src="images/humidity.png" alt="Humidity Icon" class="details-icon">
                <div class="humidity-info">
                    <p class="humidity" >60%</p>
                    <p class="label">Humidity</p>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="Wind Icon" class="details-icon">
                    <div class="wind-info">
                        <p class="wind-speed" >15 km/h</p>
                        <p class="label">Wind Speed</p>

                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
