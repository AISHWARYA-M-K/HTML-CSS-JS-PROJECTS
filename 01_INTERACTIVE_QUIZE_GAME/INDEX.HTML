<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ GAME    </title>
    <link href="https://fonts.googleapis.com/css?family=Bitcount:100,200,300,regular,500,600,700,800,900" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
 
<body>

<div class="container">
 <div class="screen active" id="start-screen">
    <h1>QUIZ TIME!</h1> 
    <p>Test your knowledge with this interactive quiz!</p>
    <button id="start-btn">start Quiz</button>
</div>

<div class="screen" id="quiz-screen">
    <div class="quiz-header">
    <h1 id="question-text">Question goes here!</h1>

    <div class="quiz-info">
    <p>
    Question <span id="current-question">0</span>of <span id="total-questions">5</span>
    </p>
    <p>
    Score: <span id="score">0</span>
    </p>
    </div>

</div>

<div id="answers-container" class="answers-container">
<!-- answer button will be inserted inside here from JavaScript code later at some point-->
</div>

<div class="progress-bar"> 
    <div id="progress" class="progress">
    </div>
</div>
</div>

<div id="result-screen" class="screen">
    <h1>QUIZ RESULTS</h1>
    <div class="result-info"></div>
     <p>you scored <span id="final-score">0 </span>out of <span id="max-score">5</span></p>
    <div id="result-message">Good Job!</div>

<div class="restart-btn" >
<button id="restart">Restart Quiz!</button>
</div>


</div>
<script src="script.js"></script>
</body>
</html>
